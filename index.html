<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Świąteczne Losowanie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎄 Świąteczne Losowanie 🎄</h1>

        <div id="login-panel" class="panel">
            <h2>Logowanie</h2>
            <input type="text" id="username" placeholder="Imię (Login)">
            <input type="password" id="password" placeholder="Hasło (Imię)">
            <button id="login-btn">Zaloguj się</button>
            <p id="login-error" class="error hidden">Błędny login lub hasło!</p>
        </div>

        <div id="dashboard-panel" class="panel hidden">
            <h2 id="welcome-message"></h2>
            
            <div id="draw-section">
                <p>Nadszedł czas, aby sprawdzić, komu w tym roku robisz prezent!</p>
                <button id="draw-btn">🎁 Losuj 🎁</button>
            </div>

            <div id="result-section" class="hidden">
                <p>Wylosowana przez Ciebie osoba to:</p>
                <h3 id="drawn-person" class="highlight"></h3>
                <div id="wishlist-section" class="hidden">
                    <h4>Lista życzeń:</h4>
                    <ul id="wishlist-items"></ul>
                </div>
            </div>
            
            <button id="logout-btn" class="secondary">Wyloguj</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
